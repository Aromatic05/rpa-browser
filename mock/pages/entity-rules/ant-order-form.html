<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ant 订单表单</title>
    <link rel="stylesheet" href="/pages/entity-rules/assets/framework.css" />
  </head>
  <body>
    <main class="page-shell ant-pro-page-container">
      <section class="page-card ant-card ant-card-bordered" role="form" aria-label="订单创建表单">
        <div class="card-header">新建订单</div>
        <div class="card-body ant-form ant-form-vertical">
          <div class="grid-2">
            <div class="form-item ant-form-item">
              <label class="required" for="formOrderNo">订单编号</label>
              <input id="formOrderNo" class="input ant-input" placeholder="例如 ORD-2026-101" />
            </div>
            <div class="form-item ant-form-item">
              <label class="required" for="formBuyer">采购人</label>
              <input id="formBuyer" class="input ant-input" placeholder="请输入采购人" />
            </div>
            <div class="form-item ant-form-item">
              <label class="required" for="formAmount">订单金额</label>
              <input id="formAmount" class="input ant-input" placeholder="请输入金额" />
            </div>
            <div class="form-item ant-form-item">
              <label class="required" for="formDept">所属部门</label>
              <select id="formDept" class="select ant-select-selector">
                <option>采购部</option>
                <option>运营部</option>
                <option>财务部</option>
              </select>
            </div>
          </div>
          <div class="form-item ant-form-item" style="margin-top: 12px;">
            <label for="formRemark">备注</label>
            <input id="formRemark" class="input ant-input" placeholder="请输入备注" />
          </div>

          <div class="actions-row">
            <button class="btn primary ant-btn ant-btn-primary" type="button">提交</button>
            <button class="btn ant-btn" type="button">保存草稿</button>
            <button class="btn ant-btn" type="button">取消</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
