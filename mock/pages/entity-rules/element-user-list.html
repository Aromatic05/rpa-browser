<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element 用户列表</title>
    <link rel="stylesheet" href="/pages/entity-rules/assets/framework.css" />
  </head>
  <body>
    <main class="page-shell el-page-container">
      <section class="page-card el-card" role="form" aria-label="用户筛选表单">
        <div class="card-header">用户筛选</div>
        <div class="card-body el-form el-form--inline">
          <div class="grid-3">
            <div class="form-item el-form-item">
              <label for="userNo">用户编号</label>
              <input id="userNo" class="input el-input__inner" placeholder="请输入用户编号" />
            </div>
            <div class="form-item el-form-item">
              <label for="userName">用户名</label>
              <input id="userName" class="input el-input__inner" placeholder="请输入用户名" />
            </div>
            <div class="form-item el-form-item">
              <label for="userState">状态</label>
              <select id="userState" class="select el-select__inner">
                <option>全部</option>
                <option>启用</option>
                <option>停用</option>
              </select>
            </div>
          </div>
          <div class="actions-row">
            <button class="btn primary el-button el-button--primary" type="button">查询</button>
            <button class="btn el-button" type="button">重置</button>
          </div>
        </div>
      </section>

      <section class="page-card el-card" role="table" aria-label="用户主表格">
        <div class="card-header">用户列表</div>
        <div class="card-body el-table__wrapper">
          <div class="table-wrap">
            <table class="table el-table">
              <thead>
                <tr>
                  <th>用户编号</th>
                  <th>用户名</th>
                  <th>手机号</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>USR-001</td>
                  <td>alice</td>
                  <td>13800001111</td>
                  <td>启用</td>
                  <td>
                    <button class="btn el-button">详情</button>
                    <button class="btn el-button">编辑</button>
                    <button class="btn el-button">禁用</button>
                  </td>
                </tr>
                <tr>
                  <td>USR-002</td>
                  <td>bob</td>
                  <td>13800002222</td>
                  <td>停用</td>
                  <td>
                    <button class="btn el-button">详情</button>
                    <button class="btn el-button">编辑</button>
                    <button class="btn el-button">启用</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <nav class="pagination el-pagination" aria-label="pagination">
            <button type="button">上一页</button>
            <span>1 / 6</span>
            <button type="button">下一页</button>
          </nav>
        </div>
      </section>
    </main>
  </body>
</html>
