<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element 用户表单</title>
    <link rel="stylesheet" href="/pages/entity-rules/assets/framework.css" />
  </head>
  <body>
    <main class="page-shell el-page-container">
      <section class="page-card el-card" role="form" aria-label="用户信息表单">
        <div class="card-header">用户信息维护</div>
        <div class="card-body el-form">
          <div class="grid-2">
            <div class="form-item el-form-item">
              <label class="required" for="elUserNo">用户编号</label>
              <input id="elUserNo" class="input el-input__inner" placeholder="例如 USR-101" />
            </div>
            <div class="form-item el-form-item">
              <label class="required" for="elUserName">用户名</label>
              <input id="elUserName" class="input el-input__inner" placeholder="请输入用户名" />
            </div>
            <div class="form-item el-form-item">
              <label class="required" for="elPhone">手机号</label>
              <input id="elPhone" class="input el-input__inner" placeholder="请输入手机号" />
            </div>
            <div class="form-item el-form-item">
              <label class="required" for="elRole">角色</label>
              <select id="elRole" class="select el-select__inner">
                <option>管理员</option>
                <option>业务员</option>
                <option>访客</option>
              </select>
            </div>
          </div>
          <div class="actions-row" style="margin-top: 16px;">
            <button class="btn primary el-button el-button--primary" type="button">提交</button>
            <button class="btn el-button" type="button">重置</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
