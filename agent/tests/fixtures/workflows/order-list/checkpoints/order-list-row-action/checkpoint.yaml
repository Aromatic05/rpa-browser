version: 1
checkpoint:
  id: order-list-row-action
  kind: recovery
  trigger:
    matchRules:
      - stepName: browser.click
      - errorCode: ERR_NOT_FOUND
  content:
    - type: act
      step:
        name: browser.click
        args:
          resolveId: rowActionInCheckpoint
  policy:
    retryOriginal: false

