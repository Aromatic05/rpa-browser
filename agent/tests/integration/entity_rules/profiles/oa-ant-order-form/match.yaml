version: 1
page:
  kind: form
  urlPattern: "/entity-rules/fixtures/order-form$"
entities:
  - ruleId: order_form_main
    source: region
    expect: unique
    match:
      kind: form

  - ruleId: order_form_submit
    source: node
    expect: unique
    within: order_form_main
    match:
      classContains: ant-btn
      textContains: 提交
