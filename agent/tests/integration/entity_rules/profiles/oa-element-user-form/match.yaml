version: 1
page:
  kind: form
  urlPattern: "/entity-rules/fixtures/user-form$"
entities:
  - ruleId: user_form_main
    source: region
    expect: unique
    match:
      kind: form

  - ruleId: user_form_submit
    source: node
    expect: unique
    within: user_form_main
    match:
      classContains: el-button
      textContains: 提交
