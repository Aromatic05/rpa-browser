version: 1
page:
  kind: table
  urlPattern: "ant-order-list\\.html$"
entities:
  - ruleId: order_list_main
    source: region
    expect: unique
    match:
      kind: table

  - ruleId: order_action_edit
    source: node
    expect: one_or_more
    within: order_list_main
    match:
      classContains: btn
      textContains: 编辑

  - ruleId: order_action_delete
    source: node
    expect: one_or_more
    within: order_list_main
    match:
      classContains: btn
      textContains: 删除
